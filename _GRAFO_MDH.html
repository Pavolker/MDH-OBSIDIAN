const nodes = data.nodes.map(n => ({
  id: n.id,
  label: n.name.length > 25 ? n.name.substring(0, 22) + '...' : n.name,
  title: n.name + '<br>' + (n.path || ''),
  group: n.group,
  value: data.edges.filter(e => e.source === n.id || e.target === n.id).length,
  color: { background: {"root": "#6C63FF", "CENTAURO CORP": "#FF6B6B", "SISTEMA CENTAURO": "#4ECDC4", "TECNOLOGIA DE PROPOSITO GERAL": "#FFE66D", "SOLU\u00c7\u00d5ES  DA MDH": "#FF8A5C", "OBSIDIAN EMPRESA": "#A78BFA", "EBOOKS": "#34D399", "AGENTE BASEADO EM TAGS": "#F472B6", "ALGORITMO DA PERGUNTA": "#60A5FA", "USOS IA DE PONTA": "#FB923C", "PESSOAL": "#818CF8", "referenced": "#9CA3AF"}[n.group] || '#9CA3AF', border: '#ffffff33' },
  font: { color: '#e5e7eb', size: 10, strokeWidth: 0 },
  borderWidth: 1,
  size: Math.min(30, Math.max(10, data.edges.filter(e => e.source === n.id || e.target === n.id).length * 2 + 8))
}));

const edges = data.edges.map(e => ({
  from: e.source,
  to: e.target,
  color: { color: '#ffffff15', hover: '#ffffff60' },
  width: 0.5,
  smooth: { type: 'continuous' }
}));

const container = document.getElementById('mynetwork');
const visData = { nodes: new vis.DataSet(nodes), edges: new vis.DataSet(edges) };
const options = {
  physics: {
    solver: 'forceAtlas2Based',
    forceAtlas2Based: { gravitationalConstant: -40, centralGravity: 0.005, springLength: 150, springConstant: 0.02, damping: 0.4 },
    stabilization: { iterations: 200 }
  },
  interaction: { hover: true, zoomSpeed: 0.8 },
  edges: { smooth: false }
};

const network = new vis.Network(container, visData, options);

network.on('click', function(params) {
  if (params.nodes.length > 0) {
    const nodeId = params.nodes[0];
    const node = nodes.find(n => n.id === nodeId);
    const conns = data.edges.filter(e => e.source === nodeId || e.target === nodeId);
    const connNames = conns.map(e => e.source === nodeId ? e.target : e.source);
    document.getElementById('info-title').textContent = nodeId;
    document.getElementById('info-path').textContent = '📁 ' + (node.path || 'referenciada externamente');
    document.getElementById('info-links').textContent = '🔗 ' + conns.length + ' conexões';
    document.getElementById('info').style.display = 'block';
  } else {
    document.getElementById('info').style.display = 'none';
  }
});

network.on('doubleClick', function(params) {
  if (params.nodes.length > 0) {
    network.focus(params.nodes[0], { scale: 2, animation: true });
  }
});
