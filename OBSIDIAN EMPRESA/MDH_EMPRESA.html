const CH = {'RAIZ':'#4A4A4A','01 - DOCUMENTOS ESTRATÉGICOS':'#3A86FF','02 - DOCUMENTOS JURIDICOS':'#8338EC','03 - DOCUMENTOS FINANCEIROS':'#FF006E','04 - DOCUMENTOS COMERCIAIS':'#FB5607','05 - DOCUMENTOS OPERACIONAIS':'#FFBE0B','06 - DOCUMENTOS DE TECNOLOGIA':'#06D6A0','07 - DOCUMENTOS DE PESSOAS':'#118AB2','08 - DOCUMENTOS DE CONTINUIDADE':'#EF476F','09 - DOCUMENTOS DE INOVAÇÃO':'#073B4C'};
const BN = {'RAIZ':'EMPRESA'}; D.blockOrder.forEach(b=>{BN[b]=b.substring(b.indexOf(' ')+1)});
const SK = 'mdh_real'; let RS = {}; try{RS=JSON.parse(localStorage.getItem(SK))||{}}catch(e){}
function sv(){try{localStorage.setItem(SK,JSON.stringify(RS))}catch(e){}}

// ─── BASE GRAPH (pre-computed positions, no D3 force) ───
(function(){
const W=window.innerWidth,H=window.innerHeight;
const S=document.getElementById('vbs');
S.setAttribute('viewBox','0 0 1200 750');
const NS=document.createElementNS('http://www.w3.org/2000/svg','svg');
NS.setAttribute('width','100%');NS.setAttribute('height','100%');
NS.setAttribute('viewBox','0 0 1200 750');
S.parentNode.replaceChild(NS,S);

const G=document.createElementNS('http://www.w3.org/2000/svg','g');
NS.appendChild(G);

// zoom
let zx=1,zxy=0;
NS.addEventListener('wheel',e=>{e.preventDefault();const d=e.deltaY>0?.9:1.1;zx*=d;G.setAttribute('transform','translate('+zxy+','+zxy+') scale('+zx+')');});

// edges
D.edges.forEach(e=>{
  const s=typeof e.source==='object'?e.source.id:e.source;
  const t=typeof e.target==='object'?e.target.id:e.target;
  const sp=P[s],tp=P[t];
  if(!sp||!tp)return;
  const l=document.createElementNS('http://www.w3.org/2000/svg','line');
  l.setAttribute('x1',sp.x);l.setAttribute('y1',sp.y);
  l.setAttribute('x2',tp.x);l.setAttribute('y2',tp.y);
  l.setAttribute('stroke','#aaa');l.setAttribute('stroke-width','.7');
  l.style.opacity='0';l.classList.add('el');
  G.appendChild(l);
});

// nodes
const nodes={};
D.nodes.forEach(n=>{
  const p=P[n.id];if(!p)return;
  const g=document.createElementNS('http://www.w3.org/2000/svg','g');
  g.setAttribute('transform','translate('+p.x+','+p.y+')');
  g.style.opacity='0';g.classList.add('node');
  const c=document.createElementNS('http://www.w3.org/2000/svg','circle');
  const r=n.type==='root'?25:n.type==='index'?19:11;
  c.setAttribute('r','0');c.setAttribute('fill',CH[n.block]||'#888');
  g.appendChild(c);
  const t=document.createElementNS('http://www.w3.org/2000/svg','text');
  t.setAttribute('text-anchor','middle');t.setAttribute('dy','.35em');
  t.setAttribute('class','nlabel');t.style.opacity='0';
  t.textContent=n.label;
  g.appendChild(t);
  G.appendChild(g);
  nodes[n.id]={g,c,r,text:t};
});

// Queue
const q=['EMPRESA'];
D.blockOrder.forEach(b=>{
  const ns=D.nodes.filter(n=>n.block===b);
  const idx=ns.find(n=>n.type==='index');if(idx)q.push(idx.id);
  ns.filter(n=>n.type==='doc').forEach(n=>q.push(n.id));
});

const vis={};let pos=0,run=true,tid=null;

function sw(id){
  if(vis[id])return;vis[id]=true;
  const n=nodes[id];if(!n)return;
  n.g.style.opacity='1';
  n.c.setAttribute('r',n.r);
  n.text.style.opacity='1';
  // edges
  D.edges.forEach(e=>{
    const s=typeof e.source==='object'?e.source.id:e.source;
    const t=typeof e.target==='object'?e.target.id:e.target;
    if(vis[s]&&vis[t]){
      G.querySelectorAll('.el').forEach((el,i)=>{
        if(i===D.edges.indexOf(e))el.style.opacity='.18';
      });
    }
  });
}
function ui(){
  const t=q.length,s=Object.keys(vis).length;
  document.getElementById('bbf').style.width=Math.min(100,(s/t)*100)+'%';
  document.getElementById('bs').textContent=s+'/'+t;
  D.blockOrder.forEach(b=>{
    const ok=D.nodes.filter(n=>n.block===b).every(n=>vis[n.id]);
    document.querySelectorAll('#bl .bli').forEach(el=>{
      if(el.dataset.b===b)el.classList.toggle('ok',ok);
    });
  });
}
function nx(){if(pos>=q.length){stp();return;}sw(q[pos]);pos++;ui();if(pos>=q.length)stp();}
function dl(){return Math.max(100,700-5*60)}
function tk(){if(!run)return;nx();if(pos<q.length)tid=setTimeout(tk,dl());}
function stp(){run=false;if(tid){clearTimeout(tid);tid=null;}document.getElementById('bp').textContent='▶';}

document.getElementById('bp').onclick=()=>{
  if(run){stp();}else{if(pos>=q.length)pos=0;run=true;document.getElementById('bp').textContent='⏸';if(pos<q.length)tk();}
};
document.getElementById('br').onclick=()=>{
  stp();Object.keys(vis).forEach(k=>delete vis[k]);
  Object.values(nodes).forEach(n=>{n.g.style.opacity='0';n.c.setAttribute('r','0');n.text.style.opacity='1';});
  document.querySelectorAll('#bl .bli').forEach(el=>el.classList.remove('ok'));
  document.querySelectorAll('.el').forEach(el=>el.style.opacity='0');
  pos=0;ui();document.getElementById('bp').textContent='▶';
};
document.getElementById('bsk').onclick=()=>{stp();if(pos>0){pos=Math.max(0,pos-2);Object.keys(vis).forEach(k=>delete vis[k]);Object.values(nodes).forEach(n=>{n.g.style.opacity='0';n.c.setAttribute('r','0');n.text.style.opacity='1';});document.querySelectorAll('.el').forEach(el=>el.style.opacity='0');for(let i=0;i<=pos&&i<q.length;i++)sw(q[i]);pos++;ui();}};
document.getElementById('bnx').onclick=()=>{stp();nx();};

// Legend
const ld=document.getElementById('bl');
ld.innerHTML='<div class="bli ok" data-b="RAIZ"><div class="bld" style="background:#4A4A4A"></div><span class="bll">EMPRESA</span></div>';
D.blockOrder.forEach(b=>{
  const d=document.createElement('div');d.className='bli';d.dataset.b=b;
  d.innerHTML='<div class="bld" style="background:'+CH[b]+'"></div><span class="bll">'+BN[b]+'</span>';
  ld.appendChild(d);
});

sw('EMPRESA');pos=1;ui();
setTimeout(()=>{run=true;tk();},600);
})();

// ─── MODE SWITCH ───
document.querySelectorAll('.mb').forEach(b=>{b.onclick=()=>{
  document.querySelectorAll('.mb').forEach(x=>x.classList.remove('on'));
  b.classList.add('on');
  document.querySelectorAll('.v').forEach(x=>x.classList.remove('on'));
  document.getElementById(b.dataset.v).classList.add('on');
  if(b.dataset.v==='vr')renderReal();
  if(b.dataset.v==='vg')renderGap();
}});

// ─── REAL ───
function gs2(id){return RS[id]===undefined?'':RS[id];}
function cs(id){
  const c=gs2(id);const n=c===''?'s':c==='s'?'p':'';
  if(n==='')delete RS[id];else RS[id]=n;
  sv();renderReal();updateScore();
}
function renderReal(){
  let h='';
  D.blockOrder.forEach(b=>{
    const ns=D.nodes.filter(n=>n.block===b);const docs=ns.filter(n=>n.type==='doc');
    const t=docs.length,ok=docs.filter(d=>gs2(d.id)==='s').length,pr=docs.filter(d=>gs2(d.id)==='p').length;
    const pt=t?Math.round((ok+pr*0.5)/t*100):0;
    h+=`<div class="rc"><div class="rch" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'flex':'none'"><div class="d" style="background:${CH[b]}"></div>${BN[b]}<span class="c">${ok+pr}/${t} (${pt}%)</span></div><div class="ri">`;
    docs.forEach(d=>{const st=gs2(d.id);h+=`<div class="re ${st==='s'?'s':''}"><div class="ts ${st}" onclick="cs('${d.id}')">${st==='s'?'✓':st==='p'?'~':''}</div><span class="l">${d.label}</span></div>`;});
    h+=`</div></div>`;
  });
  document.getElementById('rg').innerHTML=h;
}
function updateScore(){
  let t=0,ok=0,pr=0;
  D.nodes.filter(n=>n.type==='doc').forEach(d=>{t++;const g=gs2(d.id);if(g==='s')ok++;else if(g==='p')pr++;});
  document.getElementById('sb').textContent='BASE '+Math.round((ok+pr*0.5)/t*100)+'% · REAL '+Math.round(ok/t*100)+'%';
}
// ─── GAP ───
function renderGap(){
  let t=0,ok=0,pr=0;
  D.nodes.filter(n=>n.type==='doc').forEach(d=>{t++;const g=gs2(d.id);if(g==='s')ok++;else if(g==='p')pr++;});
  const fl=t-ok-pr;
  document.getElementById('gs').innerHTML=`<div class="gc g"><div class="n">${ok}</div><div class="l2">✓ OK</div></div><div class="gc y"><div class="n">${pr}</div><div class="l2">~ Parcial</div></div><div class="gc r"><div class="n">${fl}</div><div class="l2">✗ Falta</div></div>`;
  let h='';
  D.blockOrder.forEach(b=>{
    const ns=D.nodes.filter(n=>n.block===b);const docs=ns.filter(n=>n.type==='doc');
    let bk=0,bp=0,bt=docs.length;
    docs.forEach(d=>{const g=gs2(d.id);if(g==='s')bk++;else if(g==='p')bp++;});
    const bpt=bt?Math.round((bk+bp*0.5)/bt*100):0;
    h+=`<div class="gb"><h4><div class="d" style="background:${CH[b]}"></div>${BN[b]}<span style="font-weight:400;color:rgba(255,255,255,.3);font-size:10px"> ${bk+bp}/${bt}</span></h4><div class="bw"><div class="bf" style="width:${bpt}%;background:${CH[b]}"></div></div><div class="bl2"><span>${bpt}%</span><span>${bk}/${bt} completos</span></div><div style="margin-top:6px">`;
    docs.forEach(d=>{const g=gs2(d.id);const cl=g==='s'?'o':g==='p'?'p':'f';const lb=g==='s'?'✓ OK':g==='p'?'~ Parcial':'✗ Falta';
      h+=`<div class="gi"><div class="gd2" style="background:${cl==='o'?'#06D6A0':cl==='p'?'#FFBE0B':'#EF476F'}"></div><span class="gl">${d.label}</span><span class="gs2 ${cl}">${lb}</span></div>`;});
    h+=`</div></div>`;
  });
  document.getElementById('gd').innerHTML=h;
}
setTimeout(updateScore,100);
</script>
