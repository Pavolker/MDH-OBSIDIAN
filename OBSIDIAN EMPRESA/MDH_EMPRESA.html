<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MDH EMPRESA — Diagnóstico Estrutural</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,sans-serif;background:#0f0f1a;color:#eee;overflow:hidden;height:100vh}

/* TOP NAV */
#topbar{position:fixed;top:0;left:0;right:0;height:48px;background:rgba(15,15,26,.92);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;padding:0 24px;z-index:200;gap:4px}
#topbar .brand{font-weight:700;font-size:15px;letter-spacing:-.3px;margin-right:24px;color:#D97757}
.mode-btn{background:transparent;border:none;color:rgba(255,255,255,.4);padding:6px 16px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;transition:.2s}
.mode-btn:hover{color:rgba(255,255,255,.7)}
.mode-btn.active{color:#fff;background:rgba(217,119,87,.15)}
#score-badge{margin-left:auto;font-size:12px;padding:4px 12px;border-radius:100px;background:rgba(255,255,255,.05);color:rgba(255,255,255,.5)}

/* MAIN VIEWS */
.view{display:none;position:fixed;top:48px;left:0;right:0;bottom:0}
.view.active{display:flex}

/* BASE VIEW — graph */
#view-base{background:#1a1a2e}
#view-base svg{width:100%;height:100%}
#base-controls{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:12px;background:rgba(26,26,46,.9);backdrop-filter:blur(12px);padding:10px 20px;border-radius:12px;border:1px solid rgba(255,255,255,.06);z-index:100}
#base-controls button{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);color:#fff;padding:5px 14px;border-radius:6px;cursor:pointer;font-size:12px}
#base-controls button:hover{background:rgba(255,255,255,.18)}
#base-status{color:rgba(255,255,255,.45);font-size:11px;min-width:120px;text-align:center}
#base-bar{position:fixed;top:48px;left:0;right:0;height:2px;background:rgba(255,255,255,.04);z-index:150}
#base-bar-fill{height:100%;background:linear-gradient(90deg,#3A86FF,#8338EC,#FF006E,#FB5607,#FFBE0B,#06D6A0,#118AB2,#EF476F,#073B4C);width:0%;transition:width .3s}

/* REAL VIEW */
#view-real{flex-direction:column;padding:20px 32px;overflow-y:auto}
#view-real h2{font-size:18px;font-weight:600;margin-bottom:4px}
#view-real p{color:rgba(255,255,255,.4);font-size:13px;margin-bottom:20px}
.real-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px;padding-bottom:40px}
.real-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:14px;overflow:hidden}
.real-card-header{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;font-weight:600;font-size:13px;border-bottom:1px solid rgba(255,255,255,.04)}
.real-card-header .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.real-card-header .count{font-size:11px;color:rgba(255,255,255,.35);font-weight:400;margin-left:auto}
.real-items{padding:8px;display:flex;flex-direction:column;gap:4px}
.real-item{display:flex;align-items:center;gap:10px;padding:6px 10px;border-radius:8px;cursor:pointer;transition:.15s;font-size:13px}
.real-item:hover{background:rgba(255,255,255,.04)}
.real-item input[type=checkbox]{width:16px;height:16px;accent-color:#D97757;cursor:pointer;flex-shrink:0}
.real-item .status-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-left:auto}
.real-item .label{flex:1;color:rgba(255,255,255,.7)}
.real-item.checked .label{color:#fff;text-decoration:line-through;text-decoration-color:rgba(255,255,255,.2)}
.real-item.partial .label{color:rgba(255,255,255,.7)}
.real-item .partial-btn{background:transparent;border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.35);padding:2px 8px;border-radius:4px;cursor:pointer;font-size:10px;transition:.2s}
.real-item .partial-btn.active{background:rgba(255,193,7,.15);border-color:#ffc107;color:#ffc107}

/* GAP VIEW */
#view-gap{flex-direction:column;padding:20px 32px;overflow-y:auto}
#view-gap h2{font-size:18px;font-weight:600;margin-bottom:4px}
#view-gap p{color:rgba(255,255,255,.4);font-size:13px;margin-bottom:20px}
.gap-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px}
.gap-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:16px;text-align:center}
.gap-card .num{font-size:28px;font-weight:700}
.gap-card .label{font-size:12px;color:rgba(255,255,255,.4);margin-top:4px}
.gap-card.green .num{color:#06D6A0}
.gap-card.yellow .num{color:#FFBE0B}
.gap-card.red .num{color:#EF476F}
.gap-detail{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}
.gap-block{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:14px}
.gap-block h4{font-size:13px;font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.gap-block h4 .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.gap-block .bar-wrap{height:6px;background:rgba(255,255,255,.06);border-radius:3px;margin-bottom:8px;overflow:hidden}
.gap-block .bar-fill{height:100%;border-radius:3px;transition:width .5s}
.gap-block .bar-label{font-size:11px;color:rgba(255,255,255,.35);display:flex;justify-content:space-between}
.gap-item{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:12px}
.gap-item .g-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.gap-item .g-label{color:rgba(255,255,255,.6);flex:1}
.gap-item .g-status{font-size:10px;padding:2px 8px;border-radius:100px}
.g-status.ok{background:rgba(6,214,160,.15);color:#06D6A0}
.g-status.parcial{background:rgba(255,190,11,.15);color:#FFBE0B}
.g-status.falta{background:rgba(239,71,111,.15);color:#EF476F}

/* legend base */
#base-legend{position:fixed;right:16px;top:64px;background:rgba(26,26,46,.85);backdrop-filter:blur(8px);padding:12px 14px;border-radius:10px;border:1px solid rgba(255,255,255,.06);font-size:11px;z-index:100}
.base-legend-item{display:flex;align-items:center;gap:6px;padding:2px 0;opacity:.4;transition:.3s}
.base-legend-item.done{opacity:1}
.base-legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.base-legend-label{color:rgba(255,255,255,.6)}

/* checkbox three-state */
.three-state{width:16px;height:16px;border:2px solid rgba(255,255,255,.2);border-radius:3px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;transition:.15s;background:transparent}
.three-state.sim{background:#06D6A0;border-color:#06D6A0;color:#fff}
.three-state.parcial{background:#FFBE0B;border-color:#FFBE0B;color:#000}
.three-state.nao{background:transparent;border-color:rgba(255,255,255,.15);color:transparent}
</style>
</head>
<body>

<div id="topbar">
  <span class="brand">MDH EMPRESA</span>
  <button class="mode-btn active" data-mode="base">🏗️ BASE</button>
  <button class="mode-btn" data-mode="real">📋 REAL</button>
  <button class="mode-btn" data-mode="gap">📊 GAP</button>
  <span id="score-badge">BASE: 100%</span>
</div>

<!-- BASE -->
<div id="view-base" class="view active">
  <div id="base-bar"><div id="base-bar-fill"></div></div>
  <svg id="base-svg"></svg>
  <div id="base-legend"></div>
  <div id="base-controls">
    <button id="b-play">⏸</button>
    <button id="b-reset">↺</button>
    <button id="b-prev">◀</button>
    <button id="b-next">▶</button>
    <span id="base-status">0/51</span>
  </div>
</div>

<!-- REAL -->
<div id="view-real" class="view">
  <h2>📋 Diagnóstico REAL</h2>
  <p>Marque para cada documento: <strong style="color:#06D6A0">✓ Sim</strong> · <strong style="color:#FFBE0B">~ Parcial</strong> · <strong style="color:rgba(255,255,255,.2)">✗ Não</strong></p>
  <div class="real-grid" id="real-grid"></div>
</div>

<!-- GAP -->
<div id="view-gap" class="view">
  <h2>📊 Análise de GAP</h2>
  <p>Comparação entre a estrutura ideal (BASE) e o diagnóstico da sua empresa (REAL).</p>
  <div class="gap-summary" id="gap-summary"></div>
  <div class="gap-detail" id="gap-detail"></div>
</div>

  .attr('class','link').attr('stroke','#aaa').attr('stroke-width',.8)
  .attr('x1',d=>d.source.x).attr('y1',d=>d.source.y)
  .attr('x2',d=>d.target.x).attr('y2',d=>d.target.y).style('opacity',0);
const nodeG=G.append('g').selectAll('g').data(D.nodes).join('g').style('opacity',0);
nodeG.append('circle').attr('r',0).attr('fill',d=>COLORS_HEX[d.block]||'#888');
nodeG.append('text').attr('text-anchor','middle').attr('dy','.35em')
  .style('font-size','9px').style('fill','#fff').style('font-weight','500')
  .style('text-shadow','0 1px 3px rgba(0,0,0,.8)')
  .style('pointer-events','none').style('opacity',0)
  .text(d=>d.label);

sim.on('tick',()=>{
  link.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y).attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
  nodeG.attr('transform',d=>'translate('+d.x+','+d.y+')');
});

// Legend
const legendDiv=d3.select('#base-legend');
const legItems=[{id:'RAIZ',name:'EMPRESA',color:'#4A4A4A'}];
D.blockOrder.forEach(b=>legItems.push({id:b,name:BLOCK_NAMES[b],color:COLORS_HEX[b]}));
legItems.forEach(item=>{
  const div=legendDiv.append('div').attr('class','base-legend-item').attr('data-block',item.id);
  div.append('div').attr('class','base-legend-dot').style('background',item.color);
  div.append('span').attr('class','base-legend-label').text(item.name);
});

// Queue
const q=['EMPRESA'];
D.blockOrder.forEach(block=>{
  const ns=D.nodes.filter(n=>n.block===block);
  const idx=ns.find(n=>n.type==='index');
  if(idx) q.push(idx.id);
  ns.filter(n=>n.type==='doc').forEach(n=>q.push(n.id));
});
const visible={};
let pos=0,running=true,tid=null;

function delay(){return Math.max(100,700-parseInt(5)*60)}
function showNode(id){
  if(visible[id])return;
  visible[id]=true;
  const n=D.nodes.find(x=>x.id===id);if(!n)return;
  const r=n.type==='root'?25:n.type==='index'?20:12;
  const el=nodeG.filter(d=>d.id===id);
  el.style('opacity',1);
  el.select('circle').transition().duration(350).attr('r',r);
  el.select('text').transition().delay(150).duration(300).style('opacity',1);
  D.edges.forEach(e=>{
    const s=typeof e.source==='object'?e.source.id:e.source;
    const t=typeof e.target==='object'?e.target.id:e.target;
    if(visible[s]&&visible[t]) d3.select(link.filter(d=>d===e)).style('opacity',.2);
  });
}
function updateUI(){
  const tot=q.length,seen=Object.keys(visible).length;
  document.getElementById('base-bar-fill').style.width=Math.min(100,(seen/tot)*100)+'%';
  document.getElementById('base-status').textContent=seen+'/'+tot;
  D.blockOrder.forEach(b=>{
    const all=D.nodes.filter(n=>n.block===b).every(n=>visible[n.id]);
    d3.select('#base-legend').selectAll('.base-legend-item').filter(d=>d.id===b).classed('done',all);
  });
}
function next(){if(pos>=q.length){stop();return;}showNode(q[pos]);pos++;updateUI();if(pos>=q.length)stop();}
function tick(){if(!running)return;next();if(pos<q.length){sim.alpha(.15).restart();tid=setTimeout(tick,delay());}}
function stop(){running=false;if(tid){clearTimeout(tid);tid=null;}document.getElementById('b-play').textContent='▶';}

document.getElementById('b-play').onclick=()=>{
  if(running){running=false;if(tid){clearTimeout(tid);tid=null;}document.getElementById('b-play').textContent='▶';}
  else{if(pos>=q.length)pos=0;running=true;document.getElementById('b-play').textContent='⏸';if(pos<q.length)tick();}
};
document.getElementById('b-reset').onclick=()=>{
  stop();Object.keys(visible).forEach(k=>delete visible[k]);
  nodeG.style('opacity',0).select('circle').attr('r',0);
  d3.selectAll('#base-legend .base-legend-item').classed('done',false);
  link.style('opacity',0);pos=0;updateUI();
  document.getElementById('b-play').textContent='▶';
};
document.getElementById('b-prev').onclick=()=>{stop();if(pos>0){pos=Math.max(0,pos-2);Object.keys(visible).forEach(k=>delete visible[k]);nodeG.style('opacity',0).select('circle').attr('r',0);link.style('opacity',0);for(let i=0;i<=pos&&i<q.length;i++)showNode(q[i]);pos++;updateUI();}};
document.getElementById('b-next').onclick=()=>{stop();next();};

showNode('EMPRESA');pos=1;updateUI();
setTimeout(()=>{running=true;tick();},800);
})();

// ─── MODE SWITCH ───
document.querySelectorAll('.mode-btn').forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
    document.getElementById('view-'+btn.dataset.mode).classList.add('active');
    if(btn.dataset.mode==='real')renderReal();
    if(btn.dataset.mode==='gap')renderGap();
  };
});

// ─── REAL STATE ───
function loadReal(){
  try{return JSON.parse(localStorage.getItem(STORAGE_KEY))||{}}catch(e){return{}}
}
function saveReal(){
  try{
    localStorage.setItem(STORAGE_KEY,JSON.stringify(realState));
    updateScoreBadge();
  }catch(e){}
}
function getDocStatus(docId){
  if(realState[docId]===undefined)return 'nao';
  return realState[docId];
}
function setDocStatus(docId,status){
  if(status==='nao')delete realState[docId];
  else realState[docId]=status;
  saveReal();
}

// ─── REAL RENDER ───
function renderReal(){
  const grid=document.getElementById('real-grid');
  let html='';
  D.blockOrder.forEach(block=>{
    const ns=D.nodes.filter(n=>n.block===block);
    const docs=ns.filter(n=>n.type==='doc');
    const idx=ns.find(n=>n.type==='index');
    const total=docs.length;
    const ok=docs.filter(d=>getDocStatus(d.id)==='sim').length;
    const par=docs.filter(d=>getDocStatus(d.id)==='parcial').length;
    const pct=total?Math.round((ok+par*0.5)/total*100):0;
    const color=COLORS_HEX[block];
    html+=`<div class="real-card">
      <div class="real-card-header" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'flex':'none'">
        <div class="dot" style="background:${color}"></div>
        ${BLOCK_NAMES[block]}
        <span class="count">${ok+par}/${total} (${pct}%)</span>
      </div>
      <div class="real-items">`;
    docs.forEach(d=>{
      const st=getDocStatus(d.id);
      html+=`<div class="real-item ${st==='sim'?'checked':''}">
        <div class="three-state ${st}" data-id="${d.id}" onclick="cycleStatus('${d.id}')">${st==='sim'?'✓':st==='parcial'?'~':''}</div>
        <span class="label">${d.label}</span>
      </div>`;
    });
    if(idx){
      const st=getDocStatus(idx.id);
      html+=`<div class="real-item ${st==='sim'?'checked':''}" style="opacity:.5;font-style:italic">
        <div class="three-state ${st}" data-id="${idx.id}" onclick="cycleStatus('${idx.id}')">${st==='sim'?'✓':st==='parcial'?'~':''}</div>
        <span class="label">📂 ${idx.label}</span>
      </div>`;
    }
    html+=`</div></div>`;
  });
  grid.innerHTML=html;
}

function cycleStatus(id){
  const st=getDocStatus(id);
  const next=st==='nao'?'sim':st==='sim'?'parcial':'nao';
  setDocStatus(id,next);
  renderReal();
}

// ─── GAP RENDER ───
function renderGap(){
  let total=0, ok=0, par=0;
  D.nodes.filter(n=>n.type==='doc').forEach(d=>{
    total++;
    const st=getDocStatus(d.id);
    if(st==='sim')ok++;
    else if(st==='parcial')par++;
  });
  const falta=total-ok-par;
  const pct=total?Math.round((ok+par*0.5)/total*100):0;

  document.getElementById('gap-summary').innerHTML=`
    <div class="gap-card green"><div class="num">${ok}</div><div class="label">✓ OK</div></div>
    <div class="gap-card yellow"><div class="num">${par}</div><div class="label">~ Parcial</div></div>
    <div class="gap-card red"><div class="num">${falta}</div><div class="label">✗ Falta</div></div>
  `;

  let detail='';
  D.blockOrder.forEach(block=>{
    const ns=D.nodes.filter(n=>n.block===block);
    const docs=ns.filter(n=>n.type==='doc');
    const idx=ns.find(n=>n.type==='index');
    let bok=0,bpar=0,btot=docs.length;
    docs.forEach(d=>{
      const st=getDocStatus(d.id);
      if(st==='sim')bok++;else if(st==='parcial')bpar++;
    });
    const bpct=btot?Math.round((bok+bpar*0.5)/btot*100):0;
    const color=COLORS_HEX[block];
    detail+=`<div class="gap-block">
      <h4><div class="dot" style="background:${color}"></div>${BLOCK_NAMES[block]} <span style="font-weight:400;color:rgba(255,255,255,.35);font-size:11px">${bok+bpar}/${btot}</span></h4>
      <div class="bar-wrap"><div class="bar-fill" style="width:${bpct}%;background:${color}"></div></div>
      <div class="bar-label"><span>${bpct}%</span><span>${bk}/${btot} completos</span></div>
      <div style="margin-top:8px">`;
    docs.forEach(d=>{
      const st=getDocStatus(d.id);
      const cls=st==='sim'?'ok':st==='parcial'?'parcial':'falta';
      const lbl=st==='sim'?'✓ OK':st==='parcial'?'~ Parcial':'✗ Falta';
      detail+=`<div class="gap-item"><div class="g-dot" style="background:${cls==='ok'?'#06D6A0':cls==='parcial'?'#FFBE0B':'#EF476F'}"></div><span class="g-label">${d.label}</span><span class="g-status ${cls}">${lbl}</span></div>`;
    });
    detail+=`</div></div>`;
  });
  document.getElementById('gap-detail').innerHTML=detail;
}

function updateScoreBadge(){
  let total=0,ok=0,par=0;
  D.nodes.filter(n=>n.type==='doc').forEach(d=>{
    total++;
    const st=getDocStatus(d.id);
    if(st==='sim')ok++;
    else if(st==='parcial')par++;
  });
  const basePct=total?Math.round((ok+par*0.5)/total*100):0;
  const realPct=total?Math.round(ok/total*100):0;
  document.getElementById('score-badge').textContent=`BASE: ${basePct}% · REAL: ${realPct}%`;
}

// Init real state from localStorage
setTimeout(updateScoreBadge, 100);
</script>
</body>
</html>
