svg{width:100%;height:100vh}
#controls{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:14px;background:rgba(26,26,46,0.92);backdrop-filter:blur(12px);padding:12px 24px;border-radius:14px;border:1px solid rgba(255,255,255,0.08);z-index:100;font-size:13px}

.legend-item.done{opacity:1}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.legend-label{color:rgba(255,255,255,.65)}
#header{position:fixed;top:12px;left:50%;transform:translateX(-50%);z-index:100;text-align:center}
#header h1{font-size:15px;font-weight:600;letter-spacing:.3px}
#header span{font-size:11px;color:rgba(255,255,255,.3)}
input[type=range]{width:60px;height:4px;-webkit-appearance:none;background:rgba(255,255,255,.15);border-radius:2px}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:#fff;cursor:pointer}
.label{font-size:9px;pointer-events:none;font-weight:500;fill:#fff;text-shadow:0 1px 3px rgba(0,0,0,.8)}
.node-hidden{opacity:0!important;pointer-events:none}
.link{stroke:#aaa;stroke-width:.8;opacity:0}
.link.show{opacity:.2}
.btn-icon{font-size:16px;line-height:1;padding:4px 10px!important}
#blk-name{font-size:11px;color:rgba(255,255,255,.5);min-width:100px}

Recuperação DRP"},{"source":"06 - DOCUMENTOS DE TECNOLOGIA/TECNOLOGIA","target":"09 - DOCUMENTOS DE INOVAÇÃO/Roadmap Tecnológico"},{"source":"06 - DOCUMENTOS DE TECNOLOGIA/Documentação de APIs","target":"06 - DOCUMENTOS DE TECNOLOGIA/Documento de Requisitos SRS"},{"source":"06 - DOCUMENTOS DE TECNOLOGIA/Plano de Segurança da Informação","target":"08 - DOCUMENTOS DE CONTINUIDADE/Gestão de Riscos"},{"source":"06 - DOCUMENTOS DE TECNOLOGIA/Plano de Segurança da Informação","target":"08 - DOCUMENTOS DE CONTINUIDADE/Plano de Recuperação DRP"},{"source":"01 - DOCUMENTOS ESTRATÉGICOS/ESTRATÉGICO","target":"01 - DOCUMENTOS ESTRATÉGICOS/Plano de Negócios"},{"source":"01 - DOCUMENTOS ESTRATÉGICOS/ESTRATÉGICO","target":"01 - DOCUMENTOS ESTRATÉGICOS/Planejamento Estratégico"},{"source":"01 - DOCUMENTOS ESTRATÉGICOS/ESTRATÉGICO","target":"01 - DOCUMENTOS ESTRATÉGICOS/Plano Tático"},{"source":"01 - DOCUMENTOS ESTRATÉGICOS/ESTRATÉGICO","target":"01 - DOCUMENTOS ESTRATÉGICOS/Plano Operacional"},{"source":"01 - DOCUMENTOS ESTRATÉGICOS/ESTRATÉGICO","target":"01 - DOCUMENTOS ESTRATÉGICOS/Mapa Estratégico BSC"},{"source":"01 - DOCUMENTOS ESTRATÉGICOS/ESTRATÉGICO","target":"03 - DOCUMENTOS FINANCEIROS/FINANCEIRO"},{"source":"01 - DOCUMENTOS ESTRATÉGICOS/ESTRATÉGICO","target":"04 - DOCUMENTOS COMERCIAIS/COMERCIAL"},{"source":"01 - DOCUMENTOS ESTRATÉGICOS/ESTRATÉGICO","target":"07 - DOCUMENTOS DE PESSOAS/PESSOAS"},{"source":"01 - DOCUMENTOS ESTRATÉGICOS/ESTRATÉGICO","target":"09 - DOCUMENTOS DE INOVAÇÃO/INOVAÇÃO"},{"source":"01 - DOCUMENTOS ESTRATÉGICOS/Planejamento Estratégico","target":"01 - DOCUMENTOS ESTRATÉGICOS/Mapa Estratégico BSC"},{"source":"01 - DOCUMENTOS ESTRATÉGICOS/Planejamento Estratégico","target":"01 - DOCUMENTOS ESTRATÉGICOS/Plano Tático"},{"source":"01 - DOCUMENTOS ESTRATÉGICOS/Planejamento Estratégico","target":"01 - DOCUMENTOS ESTRATÉGICOS/Plano de Negócios"},{"source":"01 - DOCUMENTOS ESTRATÉGICOS/Plano Tático","target":"01 - DOCUMENTOS ESTRATÉGICOS/Plano Operacional"},{"source":"01 - DOCUMENTOS ESTRATÉGICOS/Plano Tático","target":"04 - DOCUMENTOS COMERCIAIS/Plano Comercial"},{"source":"01 - DOCUMENTOS ESTRATÉGICOS/Plano de Negócios","target":"01 - DOCUMENTOS ESTRATÉGICOS/Plano Tático"},{"source":"01 - DOCUMENTOS ESTRATÉGICOS/Mapa Estratégico BSC","target":"01 - DOCUMENTOS ESTRATÉGICOS/Plano Tático"},{"source":"01 - DOCUMENTOS ESTRATÉGICOS/Plano Operacional","target":"05 - DOCUMENTOS OPERACIONAIS/POP"},{"source":"01 - DOCUMENTOS ESTRATÉGICOS/Plano Operacional","target":"05 - DOCUMENTOS OPERACIONAIS/Organograma"},{"source":"08 - DOCUMENTOS DE CONTINUIDADE/CONTINUIDADE","target":"08 - DOCUMENTOS DE CONTINUIDADE/Gestão de Riscos"},{"source":"08 - DOCUMENTOS DE CONTINUIDADE/CONTINUIDADE","target":"08 - DOCUMENTOS DE CONTINUIDADE/Plano de Continuidade BCP"},{"source":"08 - DOCUMENTOS DE CONTINUIDADE/CONTINUIDADE","target":"08 - DOCUMENTOS DE CONTINUIDADE/Plano de Recuperação DRP"},{"source":"08 - DOCUMENTOS DE CONTINUIDADE/CONTINUIDADE","target":"08 - DOCUMENTOS DE CONTINUIDADE/Matriz de Riscos"},{"source":"08 - DOCUMENTOS DE CONTINUIDADE/CONTINUIDADE","target":"06 - DOCUMENTOS DE TECNOLOGIA/Plano de Backup e Recuperação"},{"source":"08 - DOCUMENTOS DE CONTINUIDADE/CONTINUIDADE","target":"06 - DOCUMENTOS DE TECNOLOGIA/Plano de Segurança da Informação"},{"source":"08 - DOCUMENTOS DE CONTINUIDADE/CONTINUIDADE","target":"03 - DOCUMENTOS FINANCEIROS/Planejamento Financeiro"},{"source":"08 - DOCUMENTOS DE CONTINUIDADE/Matriz de Riscos","target":"08 - DOCUMENTOS DE CONTINUIDADE/Gestão de Riscos"},{"source":"08 - DOCUMENTOS DE CONTINUIDADE/Matriz de Riscos","target":"08 - DOCUMENTOS DE CONTINUIDADE/Plano de Continuidade BCP"},{"source":"08 - DOCUMENTOS DE CONTINUIDADE/Matriz de Riscos","target":"08 - DOCUMENTOS DE CONTINUIDADE/Plano de Recuperação DRP"},{"source":"08 - DOCUMENTOS DE CONTINUIDADE/Plano de Continuidade BCP","target":"08 - DOCUMENTOS DE CONTINUIDADE/Gestão de Riscos"},{"source":"08 - DOCUMENTOS DE CONTINUIDADE/Plano de Continuidade BCP","target":"08 - DOCUMENTOS DE CONTINUIDADE/Plano de Recuperação DRP"},{"source":"08 - DOCUMENTOS DE CONTINUIDADE/Gestão de Riscos","target":"08 - DOCUMENTOS DE CONTINUIDADE/Plano de Recuperação DRP"},{"source":"08 - DOCUMENTOS DE CONTINUIDADE/Plano de Recuperação DRP","target":"06 - DOCUMENTOS DE TECNOLOGIA/Arquitetura de Sistemas"}],"blockOrder":["01 - DOCUMENTOS ESTRATÉGICOS","02 - DOCUMENTOS JURIDICOS","03 - DOCUMENTOS FINANCEIROS","04 - DOCUMENTOS COMERCIAIS","05 - DOCUMENTOS OPERACIONAIS","06 - DOCUMENTOS DE TECNOLOGIA","07 - DOCUMENTOS DE PESSOAS","08 - DOCUMENTOS DE CONTINUIDADE","09 - DOCUMENTOS DE INOVAÇÃO"],"colors":{"RAIZ":"#4A4A4A","01 - DOCUMENTOS ESTRATÉGICOS":"#3A86FF","02 - DOCUMENTOS JURIDICOS":"#8338EC","03 - DOCUMENTOS FINANCEIROS":"#FF006E","04 - DOCUMENTOS COMERCIAIS":"#FB5607","05 - DOCUMENTOS OPERACIONAIS":"#FFBE0B","06 - DOCUMENTOS DE TECNOLOGIA":"#06D6A0","07 - DOCUMENTOS DE PESSOAS":"#118AB2","08 - DOCUMENTOS DE CONTINUIDADE":"#EF476F","09 - DOCUMENTOS DE INOVAÇÃO":"#073B4C"}};

const W = window.innerWidth, H = window.innerHeight;
const SV = d3.select('#svg');
const G = SV.append('g');

SV.call(d3.zoom().scaleExtent([.2,4]).on('zoom',e=>G.attr('transform',e.transform)));

const COL = D.colors;

// Pre-compute positions
const sim = d3.forceSimulation(D.nodes)
  .force('link', d3.forceLink(D.edges).id(d=>d.id).distance(85).strength(.25))
  .force('charge', d3.forceManyBody().strength(-220))
  .force('center', d3.forceCenter(W/2, H/2))
  .force('collision', d3.forceCollide(d=>d.type==='root'?30:d.type==='index'?24:16));

sim.alpha(1).restart();
for(let i=0;i<200;i++) sim.tick();
sim.stop();

const link = G.append('g').selectAll('line').data(D.edges).join('line').attr('class','link')
  .attr('x1',d=>d.source.x).attr('y1',d=>d.source.y)
  .attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);

const nodeG = G.append('g').selectAll('g').data(D.nodes).join('g').style('opacity',0);

nodeG.append('circle').attr('r',0)
  .attr('fill',d=>COL[d.block]||'#888');

nodeG.append('text').attr('class','label').attr('text-anchor','middle').attr('dy','.35em')
  .text(d=>d.label).style('opacity',0);

// Legend
const blockNames = {'RAIZ':'EMPRESA'};
D.blockOrder.forEach(b=>{blockNames[b]=b.substring(b.indexOf(' ')+1)});
const legendDiv = d3.select('#legend');
D.blockOrder.forEach(b=>{
  const div=legendDiv.append('div').attr('class','legend-item').attr('data-block',b);
  div.append('div').attr('class','legend-dot').style('background',COL[b]);
  div.append('span').attr('class','legend-label').text(blockNames[b]);
});
// Add EMPRESA to legend
const empDiv=legendDiv.insert('div',':first-child').attr('class','legend-item done');
empDiv.append('div').attr('class','legend-dot').style('background','#4A4A4A');
empDiv.append('span').attr('class','legend-label').text('EMPRESA');

// Build queue: EMPRESA -> index each block -> docs
const q = ['EMPRESA'];
D.blockOrder.forEach(block => {
  const ns = D.nodes.filter(n=>n.block===block);
  const idx = ns.find(n=>n.type==='index');
  if(idx) q.push(idx.id);
  ns.filter(n=>n.type==='doc').forEach(n=>q.push(n.id));
});

const visible = {};
let pos = 0, running = true, tid = null;

function delay() { return Math.max(100,700-parseInt(document.getElementById('speed').value)*60); }

function showNode(id) {
  if(visible[id]) return;
  visible[id]=true;
  const n = D.nodes.find(x=>x.id===id);
  if(!n) return;
  const r = n.type==='root'?25:n.type==='index'?20:12;
  const el = nodeG.filter(d=>d.id===id);
  el.style('opacity',1);
  el.select('circle').transition().duration(350).attr('r',r);
  el.select('text').transition().delay(150).duration(300).style('opacity',1);
  // Show relevant edges
  D.edges.forEach(e=>{
    const s=typeof e.source==='object'?e.source.id:e.source;
    const t=typeof e.target==='object'?e.target.id:e.target;
    if(visible[s]&&visible[t]) link.filter(d=>d===e).classed('show',true);
  });
}

function updateUI() {
  const tot = q.length, seen = Object.keys(visible).length;
  document.getElementById('bar-fill').style.width = Math.min(100,(seen/tot)*100)+'%';
  document.getElementById('status').textContent = seen+'/'+tot;
  // Legend update
  D.blockOrder.forEach(b=>{
    const all = D.nodes.filter(n=>n.block===b).every(n=>visible[n.id]);
    d3.select('#legend').selectAll('.legend-item').filter(d=>d===b||'attr'===b)
      .classed('done',all);
  });
}

function next() {
  if(pos>=q.length){stop();return;}
  showNode(q[pos]); pos++;
  updateUI();
  if(pos>=q.length) stop();
}

function tick() {
  if(!running) return;
  next();
  if(pos<q.length) { sim.alpha(.15).restart(); tid=setTimeout(tick,delay()); }
}
function stop() { running=false; if(tid){clearTimeout(tid);tid=null;} document.getElementById('b-play').textContent='▶'; }

document.getElementById('b-play').onclick=()=>{
  if(running) { running=false; if(tid){clearTimeout(tid);tid=null;} document.getElementById('b-play').textContent='▶'; }
  else {
    if(pos>=q.length){pos=0;} 
    running=true; document.getElementById('b-play').textContent='⏸';
    if(pos<q.length) tick();
  }
};
document.getElementById('b-reset').onclick=()=>{
  stop();
  Object.keys(visible).forEach(k=>delete visible[k]);
  nodeG.style('opacity',0).select('circle').attr('r',0);
  link.classed('show',false);
  pos=0; updateUI();
  document.getElementById('b-play').textContent='▶';
};
document.getElementById('b-prev').onclick=()=>{
  stop();
  if(pos>0) {
    const prevId = q[pos-1];
    if(visible[prevId]) {
      // Remove current, then step back further
      const totalBefore = Object.keys(visible).length;
      // Go back 2 to properly step back 1
      pos = Math.max(0, pos-2);
      Object.keys(visible).forEach(k=>delete visible[k]);
      nodeG.style('opacity',0).select('circle').attr('r',0);
      link.classed('show',false);
      for(let i=0;i<=pos && i<q.length;i++) showNode(q[i]);
      pos++;
      updateUI();
    }
  }
};
document.getElementById('b-next').onclick=()=>{stop();next();};

// Auto-start
showNode('EMPRESA'); pos=1; updateUI();
setTimeout(()=>{running=true;tick();},600);

// Re-heat simulation on tick
sim.on('tick',()=>{
  link.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y).attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
  nodeG.attr('transform',d=>'translate('+d.x+','+d.y+')');
});

// (already done in tick)

window.addEventListener('resize',()=>{
  SV.attr('width',window.innerWidth).attr('height',window.innerHeight);
  sim.force('center',d3.forceCenter(window.innerWidth/2,window.innerHeight/2));
  sim.alpha(.2).restart();
});
</script>
